services:
  # 🌍 WGS84 / CGCS2000 坐标转换服务（群晖可视化部署推荐）
  coordinate-converter:
    # 镜像版本：可先用 latest；如需固定可改成 v1.1.4
    image: ghcr.io/marod1m/wgs84-cgcs2000:${APP_VERSION:-latest}

    # 端口映射：左边是群晖/宿主机端口，右边 5000 不要改
    # 示例：想用 12345 访问就写 "12345:5000"
    ports:
      - "${APP_PORT:-5000}:5000"

    # 容器异常退出时自动重启（家用/轻量生产推荐）
    restart: unless-stopped
