services:
  wgs84-cgcs2000:
    image: ghcr.io/marod1m/wgs84-cgcs2000:${APP_VERSION:-latest}
    container_name: wgs84-cgcs2000-converter
    pull_policy: always
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
