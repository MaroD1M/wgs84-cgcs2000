services:
  # 🌍 WGS84 / CGCS2000 坐标转换服务（进阶安全版）
  coordinate-converter:
    image: ghcr.io/marod1m/wgs84-cgcs2000:${APP_VERSION:-latest}
    container_name: wgs84-cgcs2000-converter
    pull_policy: always

    # 端口映射：左边可改，右边 5000 固定
    ports:
      - "${APP_PORT:-5000}:5000"

    # 运行时环境
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

    # 健康检查：用于自动判断服务是否可用
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    restart: unless-stopped

    # 安全加固（可选）
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
